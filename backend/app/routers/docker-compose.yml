services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: video_generate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  backend:
    build: ./backend
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/video_generate
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY:-sk-orx-EATWLx2onAWQfkJpRj5zOhluXYACY5hm}
      - LLM_API_URL=${LLM_API_URL:-http://10.190.0.214:8080/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-pro}
      - COMFYUI_URL=${COMFYUI_URL:-http://10.190.0.222:8188}
      - COSYVOICE_URL=${COSYVOICE_URL:-http://10.190.0.222:8000}
      - JWT_SECRET=${JWT_SECRET:-video-generate-jwt-secret}
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/output
    volumes:
      - uploads:/data/uploads
      - outputs:/data/output
    ports:
      - "8001:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://10.190.0.222:8001/api/v1
    ports:
      - "3000:3000"

  celery_worker:
    build: ./backend
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/video_generate
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY:-sk-orx-EATWLx2onAWQfkJpRj5zOhluXYACY5hm}
      - LLM_API_URL=${LLM_API_URL:-http://10.190.0.214:8080/v1}
      - COMFYUI_URL=${COMFYUI_URL:-http://10.190.0.222:8188}
      - COSYVOICE_URL=${COSYVOICE_URL:-http://10.190.0.222:8000}
      - UPLOAD_DIR=/data/uploads
      - OUTPUT_DIR=/data/output
    volumes:
      - uploads:/data/uploads
      - outputs:/data/output

  # === Phase 3: Monitoring & Storage ===
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s

  # ===== Celery beat for scheduled tasks =====
  celery_beat:
    build: ./backend
    depends_on:
      redis: { condition: service_healthy }
      db: { condition: service_healthy }
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/video_generate
      REDIS_URL: redis://redis:6379/0

volumes:
  pgdata:
  uploads:
  outputs:
  prometheus_data:
  grafana_data:
  minio_data:
